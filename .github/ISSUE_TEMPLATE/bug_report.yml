name: Bug report
description: 报告脚本、文档链接或流程中的可复现问题。
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 清楚说明预期行为与实际行为。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 执行的命令或打开的文件
        2. 输入
        3. 看到的结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Python 版本，以及使用的 AI 助手版本（如适用）。
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请删除私密作品正文、密钥和个人信息后再提交。
